services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      # .pyc 作らない。
      PYTHONDONTWRITEBYTECODE: "1"
      # stdout/stderr バッファしない。
      PYTHONUNBUFFERED: "1"
    working_dir: /app
    volumes:
      - ./:/app
    # コンテナを起動したままにする。
    tty: true
    stdin_open: true
