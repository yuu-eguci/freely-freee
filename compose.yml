services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      # .pyc 作らない。
      PYTHONDONTWRITEBYTECODE: "1"
      # stdout/stderr バッファしない。
      PYTHONUNBUFFERED: "1"
      # 仮想環境をプロジェクト直下 (/app/.venv) に作ります。
      PIPENV_VENV_IN_PROJECT: "1"
    working_dir: /app
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./:/app
      # こっち↑は bind mount.
      # こっち↓は anonymous volume. コンテナの中の、このボリュームだけは、同期しないよって設定。
      # NOTE: Dockerfile で予め pipenv sync する作りにしてる。そのあとマウントで、上書きしちゃわないようにしています。
      #       この方式だと、たとえば、コンテナの中の venv も動くし、ホスト側で pipenv sync しても、コンテナ内とは
      #       同期されないから、別々の環境で main.py を動かすことだってできる。
      - /app/.venv
    # コンテナを起動したままにする。
    tty: true
    stdin_open: true
