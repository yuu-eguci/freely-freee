[tool.ruff]
target-version = "py312"
line-length = 120
exclude = [
  ".git",
  ".mypy_cache",
  ".ruff_cache",
  ".venv",
  "docs",
]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "SIM", "RUF"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"
docstring-code-format = true
docstring-code-line-length = "dynamic"

[tool.mypy]
python_version = "3.12"

[[tool.mypy.overrides]]
module = ["requests", "requests.*"]
ignore_missing_imports = true
